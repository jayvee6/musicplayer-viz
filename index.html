<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Music Visualizer</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
  <script src="https://js-cdn.music.apple.com/musickit/v3/musickit.js" data-web-components async></script>
</head>
<body>
  <canvas id="canvas-2d"></canvas>
  <div id="webgl-container"></div>

  <div id="controls">

    <!-- ── Music controls ─────────────────────────────────── -->
    <div id="music-row">

      <!-- Left: track info -->
      <div id="track-details">
        <img id="album-art" alt="" style="display:none">
        <div id="track-text">
          <span id="track-name">No track loaded</span>
          <span id="track-time">0:00 / 0:00</span>
        </div>
      </div>

      <!-- Center: transport (absolutely centered in pill) -->
      <div id="transport">
        <button class="transport-btn" id="btn-rewind"  title="Rewind 10s"       disabled>⏪</button>
        <button class="transport-btn" id="play-pause" title="Play / Pause"     disabled>▶</button>
        <button class="transport-btn" id="btn-fwd"    title="Fast forward 10s" disabled>⏩</button>
      </div>

      <!-- Right: file load + playlist + iPod -->
      <div id="music-actions">
        <label class="file-label" title="Load audio file">
          <input type="file" id="audio-input" accept="audio/*">
          <span>Load</span>
        </label>
        <div id="playlist-wrap">
          <button id="playlist-btn" title="Music folder tracks">Tracks</button>
          <ul id="playlist-menu"></ul>
        </div>
        <button id="ipod-toggle">iPod</button>
      </div>

    </div>

    <!-- ── Progress bar ───────────────────────────────────── -->
    <div id="progress-wrap">
      <div id="progress-fill"></div>
      <div id="scrub-head"></div>
    </div>

    <!-- ── Mode + extra controls ──────────────────────────── -->
    <div id="bottom-row">

      <!-- Sliders row: always centered; only relevant controls shown -->
      <div id="sliders-row">
        <div id="vortex-controls">
          <label class="speed-label">Twist<input type="range" id="spread-slider" min="4" max="40" value="18"></label>
          <label class="speed-label">Scale<input type="range" id="zoom-slider" min="20" max="300" value="100"></label>
          <label class="speed-label">Ripple<input type="range" id="ripple-slider" min="0" max="30" value="12"></label>
          <label class="speed-label">Speed<input type="range" id="ripple-speed-slider" min="1" max="20" value="5"></label>
        </div>
        <div id="waves-controls">
          <label class="speed-label">Rings<input type="range" id="rings-slider" min="2" max="10" value="6"></label>
          <label class="speed-label">Spin<input type="range" id="spin-slider" min="0" max="100" value="50"></label>
          <label class="speed-label">Tight<input type="range" id="tight-slider" min="20" max="150" value="90"></label>
        </div>
        <div id="speed-control">
          <label class="speed-label">Speed<input type="range" id="speed-slider" min="0" max="100" value="50"></label>
        </div>
        <div id="fluid-controls">
          <label class="speed-label">Height<input type="range" id="fluid-height-slider" min="10" max="100" value="55"></label>
          <label class="speed-label">Stiffness<input type="range" id="fluid-stiff-slider" min="2" max="50" value="18"></label>
          <label class="speed-label">Gloss<input type="range" id="fluid-blob-slider" min="0" max="20" value="10"></label>
        </div>
      </div>

      <!-- Mode buttons row: always same width, determines pill size -->
      <div id="mode-buttons">
        <button class="mode-btn active" data-mode="0">Mandala</button>
        <button class="mode-btn" data-mode="1">Emoji Waves</button>
        <button class="mode-btn" data-mode="2">Emoji Vortex</button>
        <button class="mode-btn" data-mode="3">3D Blob</button>
        <button class="mode-btn" data-mode="4">Hypno Rings</button>
        <button class="mode-btn" data-mode="5">Spiral</button>
        <button class="mode-btn" data-mode="6">Subwoofer</button>
        <button class="mode-btn" data-mode="7">Ferro</button>
      </div>

    </div>

  </div>

  <!-- ── Sign-in (bottom-left, mirrors #ui-buttons) ──────── -->
  <div id="sign-in-buttons">
    <button class="ui-btn" id="signin-btn" title="Music accounts">
      <span class="signin-icon">👤</span>
      <span class="signin-dot"></span>
    </button>
    <div id="streaming-menu">
      <div id="streaming-sources">
        <button class="stream-src-btn active" data-src="spotify">Spotify</button>
        <button class="stream-src-btn" data-src="apple">Apple Music</button>
      </div>
      <div id="streaming-auth">
        <button id="streaming-connect">Connect</button>
        <span id="streaming-auth-status">Not connected</span>
      </div>
      <p id="streaming-hint">Once connected, open the <strong>iPod</strong> to browse your library.</p>
    </div>
  </div>

  <!-- ── Utility buttons (bottom-right) ──────────────────── -->
  <div id="ui-buttons">
    <button class="ui-btn" id="btn-ipod" title="iPod mode">🎵</button>
    <button class="ui-btn" id="btn-hide" title="Hide controls">👁</button>
    <button class="ui-btn" id="btn-fullscreen" title="Fullscreen">⛶</button>
  </div>

  <!-- ── iPod overlay ─────────────────────────────────────── -->
  <div class="ipod" id="ipod-overlay">

    <div class="ipod-screen-bezel">
      <div class="ipod-screen">

        <!-- Not connected to any streaming source -->
        <div class="screen-view" id="ipod-view-empty">
          <div class="screen-titlebar">Music Visualizer</div>
          <div class="ipod-empty">Connect a music<br>account to browse<br>your library</div>
        </div>

        <!-- Library menu (Playlists / Artists / Albums / Songs, drill-down) -->
        <div class="screen-view hidden" id="ipod-view-menu">
          <div class="screen-titlebar" id="ipod-menu-title">iPod</div>
          <ul id="ipod-menu-list"></ul>
        </div>

        <!-- Now playing -->
        <div class="screen-view hidden" id="ipod-view-nowplaying">
          <div class="screen-titlebar">Now Playing</div>
          <div class="now-playing">
            <img id="ipod-art" alt="">
            <p class="np-title" id="ipod-track-name">—</p>
            <p class="np-artist" id="ipod-track-time">0:00 / 0:00</p>
            <div class="np-progress">
              <div class="np-bar"><div class="np-fill" id="ipod-np-fill"></div></div>
            </div>
          </div>
        </div>

      </div>
    </div>

    <div class="wheel" id="ipod-wheel">
      <div class="wheel-label wheel-menu">MENU</div>
      <div class="wheel-label wheel-back">⏮</div>
      <div class="wheel-label wheel-forward">⏭</div>
      <div class="wheel-label wheel-play">▶︎</div>
      <div class="wheel-center" id="ipod-center"></div>
    </div>

  </div>

  <script src="music-source.js"></script>
  <script src="spotify-auth.js"></script>
  <script src="spotify-source.js"></script>
  <script src="apple-auth.js"></script>
  <script src="apple-source.js"></script>
  <script src="app.js"></script>
</body>
</html>
