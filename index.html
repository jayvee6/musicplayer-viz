<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Music Visualizer</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <!-- Three.js postprocessing (EffectComposer + RenderPass + ShaderPass +
       CopyShader). UMD globals attach to THREE namespace. Loaded for the
       Retro Film pass on Lunar; any future viz that wants postprocessing
       can reuse viz/retro-pass.js's makeRetroComposer() helper. -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
  <!-- UnrealBloomPass + its dependency (LuminosityHighPassShader) for the
       disco-chrome viz. UMD globals attach to THREE.* namespace. -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
  <script src="https://js-cdn.music.apple.com/musickit/v3/musickit.js" data-web-components async></script>
  <script src="https://sdk.scdn.co/spotify-player.js"></script>
</head>
<body>
  <canvas id="canvas-2d"></canvas>
  <div id="webgl-container"></div>

  <!-- Viz title overlay — fades in briefly when switching modes, fades out.
       Positioned above the controls pill so it reads against the active viz. -->
  <div id="viz-title-overlay"></div>

  <!-- Edge cycle buttons — tall slim columns at the screen edges that swap
       to the previous / next visualizer. Mirror of the iOS swipe-left/right
       gesture for mouse + touch users. -->
  <button id="viz-cycle-prev" class="viz-cycle-btn" aria-label="Previous visualizer">
    <span class="viz-cycle-arrow">‹</span>
  </button>
  <button id="viz-cycle-next" class="viz-cycle-btn" aria-label="Next visualizer">
    <span class="viz-cycle-arrow">›</span>
  </button>

  <div id="controls">

    <!-- ── Music controls ─────────────────────────────────── -->
    <div id="music-row">

      <!-- Left: track info -->
      <div id="track-details">
        <img id="album-art" alt="" style="display:none">
        <div id="track-text">
          <span id="track-name">No track loaded</span>
          <span id="track-time">0:00 / 0:00</span>
        </div>
      </div>

      <!-- Center: transport (absolutely centered in pill) -->
      <div id="transport">
        <button class="transport-btn" id="btn-shuffle" title="Shuffle">🔀</button>
        <button class="transport-btn" id="btn-prev"    title="Previous track"  disabled>⏮</button>
        <button class="transport-btn" id="btn-rewind"  title="Rewind 10s"       disabled>⏪</button>
        <button class="transport-btn" id="play-pause"  title="Play / Pause"     disabled>▶</button>
        <button class="transport-btn" id="btn-fwd"     title="Fast forward 10s" disabled>⏩</button>
        <button class="transport-btn" id="btn-next"    title="Next track"       disabled>⏭</button>
        <button class="transport-btn" id="btn-repeat"  title="Repeat: Off">🔁</button>
      </div>

      <!-- Right: file load + playlist + iPod -->
      <div id="music-actions">
        <label class="file-label" title="Load audio file">
          <input type="file" id="audio-input" accept="audio/*">
          <span>Load</span>
        </label>
        <div id="playlist-wrap">
          <button id="playlist-btn" title="Music folder tracks">Tracks</button>
          <ul id="playlist-menu"></ul>
        </div>
        <button id="ipod-toggle">iPod</button>
      </div>

    </div>

    <!-- ── Progress bar ───────────────────────────────────── -->
    <div id="progress-wrap">
      <div id="progress-fill"></div>
      <div id="scrub-head"></div>
    </div>

    <!-- ── Mode + extra controls ──────────────────────────── -->
    <div id="bottom-row">

      <!-- Sliders row: always centered; only relevant controls shown -->
      <div id="sliders-row">
        <div id="vortex-controls">
          <label class="speed-label">Twist<input type="range" id="spread-slider" min="4" max="40" value="18"></label>
          <label class="speed-label">Scale<input type="range" id="zoom-slider" min="20" max="300" value="100"></label>
          <label class="speed-label">Ripple<input type="range" id="ripple-slider" min="0" max="30" value="12"></label>
          <label class="speed-label">Speed<input type="range" id="ripple-speed-slider" min="1" max="20" value="5"></label>
        </div>
        <div id="waves-controls">
          <label class="speed-label">Rings<input type="range" id="rings-slider" min="2" max="10" value="6"></label>
          <label class="speed-label">Spin<input type="range" id="spin-slider" min="0" max="100" value="50"></label>
          <label class="speed-label">Tight<input type="range" id="tight-slider" min="20" max="150" value="90"></label>
        </div>
        <div id="speed-control">
          <label class="speed-label">Speed<input type="range" id="speed-slider" min="0" max="100" value="50"></label>
        </div>
        <div id="fluid-controls">
          <label class="speed-label">Height<input type="range" id="fluid-height-slider" min="10" max="100" value="85"></label>
          <label class="speed-label">Stiffness<input type="range" id="fluid-stiff-slider" min="2" max="50" value="18"></label>
          <label class="speed-label">Gloss<input type="range" id="fluid-blob-slider" min="0" max="20" value="10"></label>
        </div>
      </div>

      <!-- Mode buttons row: populated at bootstrap by viz-registry.js.
           Each registered visualizer appends a .mode-btn here. -->
      <div id="mode-buttons"></div>

    </div>

  </div>

  <!-- ── Sign-in (bottom-left, mirrors #ui-buttons) ──────── -->
  <div id="sign-in-buttons">
    <button class="ui-btn" id="signin-btn" title="Music accounts">
      <span class="signin-icon">👤</span>
      <span class="signin-dot"></span>
    </button>
    <div id="streaming-menu">
      <div id="streaming-sources">
        <button class="stream-src-btn active" data-src="spotify">Spotify</button>
        <button class="stream-src-btn" data-src="apple">Apple Music</button>
      </div>
      <div id="streaming-auth">
        <button id="streaming-connect">Connect</button>
        <span id="streaming-auth-status">Not connected</span>
      </div>
      <p id="streaming-hint">Once connected, open the <strong>iPod</strong> to browse your library.</p>
      <div id="viz-source">
        <div class="viz-source-title">Reactive visuals</div>
        <div class="viz-source-btns">
          <button id="viz-capture-btn" class="viz-source-btn">Capture tab audio</button>
          <button id="viz-mic-btn" class="viz-source-btn">Microphone</button>
          <button id="viz-ambient-btn" class="viz-source-btn">Ambient (120 BPM)</button>
          <button id="viz-off-btn" class="viz-source-btn" hidden>Stop</button>
        </div>
        <div id="viz-source-status"></div>
      </div>
    </div>
  </div>

  <!-- ── Utility buttons (bottom-right) ──────────────────── -->
  <div id="ui-buttons">
    <button class="ui-btn" id="btn-ipod" title="iPod mode">🎵</button>
    <button class="ui-btn" id="btn-hide" title="Hide controls">👁</button>
    <button class="ui-btn" id="btn-fullscreen" title="Fullscreen">⛶</button>
  </div>

  <!-- ── iPod overlay ─────────────────────────────────────── -->
  <div class="ipod" id="ipod-overlay">

    <div class="ipod-screen-bezel">
      <div class="ipod-screen">

        <!-- Not connected to any streaming source -->
        <div class="screen-view" id="ipod-view-empty">
          <div class="screen-titlebar">Music Visualizer</div>
          <div class="ipod-empty">Connect a music<br>account to browse<br>your library</div>
        </div>

        <!-- Library menu (Playlists / Artists / Albums / Songs, drill-down) -->
        <div class="screen-view hidden" id="ipod-view-menu">
          <div class="screen-titlebar" id="ipod-menu-title">iPod</div>
          <ul id="ipod-menu-list"></ul>
        </div>

        <!-- Now playing -->
        <div class="screen-view hidden" id="ipod-view-nowplaying">
          <div class="screen-titlebar">Now Playing</div>
          <div class="now-playing">
            <img id="ipod-art" alt="">
            <p class="np-title" id="ipod-track-name">—</p>
            <p class="np-artist" id="ipod-track-time">0:00 / 0:00</p>
            <div class="np-progress">
              <div class="np-bar"><div class="np-fill" id="ipod-np-fill"></div></div>
            </div>
          </div>
        </div>

      </div>
    </div>

    <div class="wheel" id="ipod-wheel">
      <div class="wheel-label wheel-menu">MENU</div>
      <div class="wheel-label wheel-back">⏮</div>
      <div class="wheel-label wheel-forward">⏭</div>
      <div class="wheel-label wheel-play">▶︎</div>
      <div class="wheel-center" id="ipod-center"></div>
    </div>

  </div>

  <script src="music-source.js"></script>
  <script src="spotify-auth.js"></script>
  <script src="spotify-analysis.js"></script>
  <script src="spotify-player.js"></script>
  <script src="spotify-source.js"></script>
  <script src="apple-auth.js"></script>
  <script src="apple-source.js"></script>
  <script src="audio-capture.js"></script>
  <script src="ambient-mode.js"></script>
  <script src="meta-cache.js"></script>
  <script src="spotify-features.js"></script>
  <script src="apple-isrc.js"></script>
  <script src="track-meta.js"></script>
  <script src="viz-registry.js"></script>
  <script src="audio-engine.js"></script>
  <script src="app.js"></script>
  <script src="viz/kaleidoscope.js"></script>
  <script src="viz/dvd-mode.js"></script>
  <script src="viz/rorschach.js"></script>
  <script src="viz/fireworks.js"></script>
  <script src="viz/retro-pass.js"></script>
  <script src="viz/audio-textures.js"></script>
  <script src="viz/envelopes.js"></script>
  <script src="viz/seismic-mesh.js"></script>
  <script src="viz/lunar.js"></script>
  <script src="viz/disco-chrome.js"></script>
  <script src="viz/ferrofluid.js"></script>
  <script src="viz/neon-oscilloscope.js"></script>
  <script src="viz/spectrogram.js"></script>
  <script src="viz/siri-waveform.js"></script>
  <script src="viz/wire-terrain.js"></script>
  <script src="viz/cosmic-wave.js"></script>
</body>
</html>
